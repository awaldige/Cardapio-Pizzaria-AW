<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzaria AW | Cardápio Digital</title>
    <link rel="icon" type="image/png" href="assets/img/logo%20aw.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <img src="assets/img/logo%20aw.png" alt="Logo" class="nav-logo">
                <div class="brand-text">
                    <h1>Pizzaria AW</h1>
                    <small><i class="fas fa-circle status-on"></i> Aberto Agora</small>
                </div>
            </div>
            <div class="nav-cart" onclick="scrollToElement('order-summary')">
                <div class="cart-icon-wrapper">
                    <i class="fas fa-shopping-bag"></i>
                    <span id="cart-count">0</span>
                </div>
                <span class="cart-label">Meu Pedido</span>
            </div>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="hero-carousel">
            <div class="slides">
                <div class="slide active"><img src="assets/img/camarao.jpg" alt="Slide 1"></div>
                <div class="slide"><img src="assets/img/pizza%20variadas.jpg" alt="Slide 2"></div>
                <div class="slide"><img src="assets/img/pizza.jpg" alt="Slide 3"></div>
                <div class="slide"><img src="assets/img/pizzas.jpg" alt="Slide 4"></div>
            </div>
        </section>

        <section class="search-section">
            <div class="search-field">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Buscar sabor ou bebida...">
            </div>
        </section>

        <div id="menu-container"></div>

        <div class="checkout-wrapper" id="order-summary">
            <section class="checkout-card">
                <div class="checkout-header">
                    <h2><i class="fas fa-receipt"></i> Itens do Pedido</h2>
                    <button class="btn-clear" onclick="clearCart()">Limpar</button>
                </div>
                <div id="order-list" class="checkout-items">
                    <p class="empty-text">Seu carrinho está vazio</p>
                </div>
                <div class="total-row">
                    <span>Total:</span>
                    <strong id="total-price">R$ 0,00</strong>
                </div>
            </section>

            <section class="checkout-card">
                <form id="checkout-form" class="delivery-form">
                    <h3><i class="fas fa-map-marker-alt"></i> Dados de Entrega</h3>
                    <div class="form-group">
                        <input type="text" id="client-name" placeholder="Nome Completo" required>
                    </div>
                    <div class="form-grid">
                        <input type="text" id="address" placeholder="Rua e Número" required>
                        <input type="text" id="neighborhood" placeholder="Bairro" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="reference" placeholder="Ponto de Referência (Opcional)">
                    </div>
                    <div class="form-group">
                        <select id="payment" onchange="toggleTroco()">
                            <option value="Pix">Pix</option>
                            <option value="Cartão">Cartão (Maquininha)</option>
                            <option value="Dinheiro">Dinheiro</option>
                        </select>
                    </div>
                    <div id="troco-box" class="form-group" style="display:none">
                        <input type="number" id="troco" placeholder="Troco para quanto?">
                    </div>
                    <button type="submit" class="btn-confirm">
                        <i class="fab fa-whatsapp"></i> ENVIAR PEDIDO
                    </button>
                </form>
            </section>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-grid">
                <div class="footer-brand">
                    <img src="assets/img/logo%20aw.png" alt="Logo">
                    <h3>Pizzaria AW</h3>
                    <p>O melhor sabor da região direto na sua mesa.</p>
                </div>
                <div class="footer-map">
                    <h4><i class="fas fa-map-marked-alt"></i> Onde Estamos</h4>
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.1975!2d-46.6!3d-23.5!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjPCsDMwJzAwLjAiUyA0NsKwMzYnMDAuMCJX!5e0!3m2!1spt-BR!2sbr!4v1620000000000!5m2!1spt-BR!2sbr" 
                        allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
            <div class="footer-social">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-whatsapp"></i></a>
            </div>
            <p class="copyright">© 2026 Pizzaria AW. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
