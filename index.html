<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzaria AW | Painel de Pedidos</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='80'%3E🍕%3C/text%3E%3C/svg%3E">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <div class="logo-area">
                <img src="logo aw.png" alt="Pizzaria AW" class="logo">
                <div class="brand-text">
                    <h1>Pizzaria AW</h1>
                    <span class="status"><i class="fas fa-circle"></i> Aberto Agora</span>
                </div>
            </div>
            <button class="cart-icon-btn" onclick="document.getElementById('order-summary').scrollIntoView({behavior: 'smooth'})">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </button>
        </div>
    </header>

    <main>
        <section id="gallery" class="carousel">
            <div class="carousel-container">
                <div class="carousel-slide active">
                    <img src="pepperoni.jpg" alt="Pizza de Pepperoni em Destaque">
                </div>
                <div class="carousel-slide">
                    <img src="Pizza variadas.jpg" alt="Nossas Pizzas Variadas">
                </div>
            </div>

            <button class="carousel-prev" aria-label="Anterior"><i class="fas fa-chevron-left"></i></button>
            <button class="carousel-next" aria-label="Próximo"><i class="fas fa-chevron-right"></i></button>

            <div class="carousel-indicators">
                <span class="dot active"></span>
                <span class="dot"></span>
            </div>
        </section>

        <section id="search" class="sticky-search">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="O que vamos pedir hoje?">
            </div>
        </section>

        <div id="menu-container">
            </div>

        <section id="order-summary" class="order-container">
            <h3><i class="fas fa-shopping-basket"></i> Meu Carrinho</h3>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
            
            <div id="order-list">
                <p style="text-align: center; color: #999; padding: 20px;">Seu carrinho está vazio.</p>
            </div>

            <div class="total-bar">
                <span>Total:</span>
                <span id="total-price">R$ 0,00</span>
            </div>

            <button id="finalizar-pedido" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> ENVIAR PEDIDO VIA WHATSAPP
            </button>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p><strong>Pizzaria AW</strong></p>
            <p>Rua da Pizza, 123 - São Paulo/SP</p>
            <div style="margin: 15px 0;">
                <i class="fab fa-instagram" style="margin: 0 10px; font-size: 1.2rem;"></i>
                <i class="fab fa-facebook" style="margin: 0 10px; font-size: 1.2rem;"></i>
            </div>
            <p class="footer-bottom">&copy; 2026 Pizzaria AW | Desenvolvido por André Waldige</p>
        </div>
    </footer>

    <script src="script.js"></script>

</body>
</html>
