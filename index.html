<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzaria AW | Painel de Pedidos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <div class="logo-area">
                <img src="logo aw.png" alt="Pizzaria AW" class="logo">
                <div class="brand-text">
                    <h1>Pizzaria AW</h1>
                    <span class="status"><i class="fas fa-circle"></i> Aberto</span>
                </div>
            </div>
            <button class="cart-icon-btn" onclick="document.getElementById('order-summary').scrollIntoView({behavior: 'smooth'})">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </button>
        </div>
    </header>

    <main>
        <section id="gallery" class="carousel-container">
            <div class="carousel-slides">
                <img src="pepperoni.jpg" class="carousel-item active">
                <img src="Pizza variadas.jpg" class="carousel-item">
            </div>
        </section>

        <section id="search" class="sticky-search">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Pesquisar item...">
            </div>
        </section>

        <section id="menu-container"></section>

        <section id="order-summary" class="order-container">
            <h3><i class="fas fa-shopping-basket"></i> Meu Carrinho</h3>
            <div id="order-list"></div>
            <div class="total-bar">
                <span>Total:</span>
                <span id="total-price">R$ 0,00</span>
            </div>
            <button id="finalizar-pedido" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> Enviar Pedido
            </button>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Pizzaria AW | Desenvolvido por André Waldige</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
