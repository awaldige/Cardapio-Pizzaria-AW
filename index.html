<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzaria AW | Cardápio Digital</title>
    <link rel="icon" type="image/png" href="assets/img/logo%20aw.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="brand">
                <img src="assets/img/logo%20aw.png" alt="Logo" class="logo-img">
                <div class="brand-info">
                    <h1>Pizzaria AW</h1>
                    <span class="status-badge"><i class="fas fa-circle"></i> Aberto</span>
                </div>
            </div>
            <div class="header-actions">
                <button class="cart-toggle" onclick="scrollToCart()">
                    <i class="fas fa-shopping-basket"></i>
                    <span id="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <section class="carousel">
            <div class="carousel-container">
                <div class="carousel-slide active"><img src="assets/img/camarao.jpg"></div>
                <div class="carousel-slide"><img src="assets/img/pizza%20variadas.jpg"></div>
                <div class="carousel-slide"><img src="assets/img/pizza.jpg"></div>
                <div class="carousel-slide"><img src="assets/img/pizzas.jpg"></div>
                <div class="carousel-slide"><img src="assets/img/pizzas1.jpg"></div>
                <div class="carousel-slide"><img src="assets/img/portuguesa.jpg"></div>
            </div>
            <div class="carousel-indicators" id="indicators"></div>
        </section>

        <section class="user-id-section">
            <div class="input-box">
                <i class="fas fa-user-tag"></i>
                <input type="text" id="client-name" placeholder="Como podemos te chamar?">
            </div>
        </section>

        <section class="sticky-search">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="O que você deseja comer hoje?">
            </div>
        </section>

        <div id="menu-container"></div>

        <section id="order-summary" class="modern-cart">
            <div class="cart-header">
                <h3><i class="fas fa-shopping-cart"></i> Seu Pedido</h3>
                <button class="clear-cart" onclick="clearCart()">Limpar</button>
            </div>
            
            <div id="order-list" class="cart-items-list">
                <div class="empty-state">
                    <i class="fas fa-pizza-slice"></i>
                    <p>Seu carrinho está vazio</p>
                </div>
            </div>

            <div class="cart-footer">
                <div class="payment-method">
                    <label><i class="fas fa-credit-card"></i> Pagamento:</label>
                    <select id="payment">
                        <option value="Pix">Pix</option>
                        <option value="Cartão">Cartão (Entrega)</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                </div>
                
                <div class="total-container">
                    <span>Total do Pedido</span>
                    <span id="total-price">R$ 0,00</span>
                </div>

                <button id="finalizar-pedido" class="checkout-btn">
                    <i class="fab fa-whatsapp"></i> FINALIZAR PEDIDO
                </button>
            </div>
        </section>

        <section class="address-footer">
            <p><i class="fas fa-map-marker-alt"></i> Rua Aluísio Azevedo, 297 - Santana</p>
            <a href="https://maps.google.com/?q=Rua+Aluísio+Azevedo+297+Santana" target="_blank">Ver no Mapa</a>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
