<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzaria AW | Cardápio Digital</title>
    
    <link rel="icon" type="image/png" href="assets/img/logo%20aw.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <img src="assets/img/logo%20aw.png" alt="Logo" class="nav-logo">
                <div>
                    <h1>Pizzaria AW</h1>
                    <small><i class="fas fa-circle status-on"></i> Aberto para pedidos</small>
                </div>
            </div>
            <div class="nav-cart" onclick="scrollToElement('order-summary')">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="hero-carousel">
            <div class="slides">
                <div class="slide active"><img src="assets/img/camarao.jpg" alt="Destaque"></div>
                <div class="slide"><img src="assets/img/pizza%20variadas.jpg" alt="Destaque"></div>
                <div class="slide"><img src="assets/img/pizza.jpg" alt="Destaque"></div>
                <div class="slide"><img src="assets/img/pizzas.jpg" alt="Destaque"></div>
            </div>
        </section>

        <section class="form-section">
            <div class="input-card">
                <label for="client-name">Seu Nome</label>
                <div class="input-field">
                    <i class="far fa-user"></i>
                    <input type="text" id="client-name" placeholder="Como devemos te chamar?">
                </div>
            </div>
            
            <div class="search-section">
                <div class="search-field">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Buscar sabor ou bebida...">
                </div>
            </div>
        </section>

        <div id="menu-container"></div>

        <section id="order-summary" class="checkout-card">
            <div class="checkout-header">
                <h2><i class="fas fa-receipt"></i> Meu Pedido</h2>
                <button class="btn-clear" onclick="clearCart()">Limpar Tudo</button>
            </div>
            
            <div id="order-list" class="checkout-items">
                </div>

            <div class="checkout-footer">
                <div class="payment-box">
                    <span>Forma de Pagamento:</span>
                    <select id="payment">
                        <option value="Pix">Pix</option>
                        <option value="Cartão (Entrega)">Cartão na Entrega</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                </div>
                
                <div class="total-row">
                    <span>Total do Pedido:</span>
                    <strong id="total-price">R$ 0,00</strong>
                </div>

                <button id="finalizar-pedido" class="btn-confirm">
                    <i class="fab fa-whatsapp"></i> CONCLUIR VIA WHATSAPP
                </button>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
