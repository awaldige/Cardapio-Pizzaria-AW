<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzaria AW | Cardápio Digital</title>
    
    <link rel="icon" type="image/png" href="assets/img/logo%20aw.png">
    <link rel="apple-touch-icon" href="assets/img/logo%20aw.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <img src="assets/img/logo%20aw.png" alt="Logo" class="nav-logo">
                <div>
                    <h1>Pizzaria AW</h1>
                    <small><i class="fas fa-circle status-on"></i> Aberto para pedidos</small>
                </div>
            </div>
            <div class="nav-cart" onclick="scrollToElement('order-summary')">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="hero-carousel">
            <div class="slides">
                <div class="slide active"><img src="assets/img/camarao.jpg"></div>
                <div class="slide"><img src="assets/img/pizza%20variadas.jpg"></div>
                <div class="slide"><img src="assets/img/pizza.jpg"></div>
                <div class="slide"><img src="assets/img/pizzas.jpg"></div>
                <div class="slide"><img src="assets/img/pizzas1.jpg"></div>
                <div class="slide"><img src="assets/img/portuguesa.jpg"></div>
            </div>
        </section>

        <section class="input-card">
            <label>Seu Nome</label>
            <div class="input-field">
                <i class="far fa-user"></i>
                <input type="text" id="client-name" placeholder="Ex: André Waldige">
            </div>
        </section>

        <section class="search-section">
            <div class="search-field">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="O que deseja comer?">
            </div>
        </section>

        <div id="menu-container"></div>

        <section id="order-summary" class="checkout-card">
            <div class="checkout-header">
                <h2><i class="fas fa-receipt"></i> Resumo do Pedido</h2>
                <button class="btn-clear" onclick="clearCart()">Limpar</button>
            </div>
            <div id="order-list" class="checkout-items">
                <p class="empty-text">Carrinho vazio</p>
            </div>
            <div class="checkout-footer">
                <div class="payment-box">
                    <span>Pagamento:</span>
                    <select id="payment">
                        <option value="Pix">Pix</option>
                        <option value="Cartão">Cartão na Entrega</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                </div>
                <div class="total-row">
                    <span>Total</span>
                    <strong id="total-price">R$ 0,00</strong>
                </div>
                <button id="finalizar-pedido" class="btn-confirm">
                    <i class="fab fa-whatsapp"></i> CONCLUIR NO WHATSAPP
                </button>
            </div>
        </section>

        <footer class="footer-contact">
            <p><strong>Pizzaria AW</strong></p>
            <p><i class="fas fa-map-marker-alt"></i> Rua Aluísio Azevedo, 297 - Santana</p>
            <a href="https://maps.google.com" target="_blank" class="btn-map">Ver no Google Maps</a>
        </footer>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
