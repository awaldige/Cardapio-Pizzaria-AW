<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzaria AW | Cardápio Digital</title>
    
    <link rel="icon" type="image/png" href="assets/img/logo%20aw.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <div class="logo-area">
                <img src="assets/img/logo%20aw.png" alt="Pizzaria AW" class="logo">
                <div class="brand-text">
                    <h1>Pizzaria AW</h1>
                    <span class="status"><i class="fas fa-circle"></i> Aberto Agora</span>
                </div>
            </div>
            <button class="cart-icon-btn" onclick="document.getElementById('order-summary').scrollIntoView({behavior: 'smooth'})">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </button>
        </div>
    </header>

    <main>
        <section id="gallery" class="carousel">
            <div class="carousel-container">
                <div class="carousel-slide active"><img src="assets/img/logo%20aw.png" alt="Logo AW"></div>
                <div class="carousel-slide"><img src="assets/img/pepperoni.jpg" alt="Pepperoni"></div>
                <div class="carousel-slide"><img src="assets/img/camarao.jpg" alt="Camarão"></div>
                <div class="carousel-slide"><img src="assets/img/portuguesa.jpg" alt="Portuguesa"></div>
                <div class="carousel-slide"><img src="assets/img/deliciosa-pizza.jpg" alt="Especial"></div>
                <div class="carousel-slide"><img src="assets/img/Pizza%20variadas.jpg" alt="Variadas"></div>
            </div>
            <button class="carousel-prev" onclick="changeSlide(-1)"><i class="fas fa-chevron-left"></i></button>
            <button class="carousel-next" onclick="changeSlide(1)"><i class="fas fa-chevron-right"></i></button>
            
            <div class="carousel-indicators">
                <span class="dot active" onclick="currentSlide(0)"></span>
                <span class="dot" onclick="currentSlide(1)"></span>
                <span class="dot" onclick="currentSlide(2)"></span>
                <span class="dot" onclick="currentSlide(3)"></span>
                <span class="dot" onclick="currentSlide(4)"></span>
                <span class="dot" onclick="currentSlide(5)"></span>
            </div>
        </section>

        <section class="sticky-search">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Buscar no cardápio...">
            </div>
        </section>

        <section class="client-info-section">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="client-name" placeholder="Seu nome para o pedido">
            </div>
        </section>

        <div id="menu-container"></div>

        <section id="order-summary" class="order-container">
            <h3><i class="fas fa-shopping-cart"></i> Meu Carrinho</h3>
            <div id="order-list">
                <p class="empty-msg">Nenhum item adicionado.</p>
            </div>

            <div class="payment-area">
                <p>Forma de Pagamento:</p>
                <select id="payment">
                    <option value="Pix">Pix (Desconto)</option>
                    <option value="Cartão">Cartão na Entrega</option>
                    <option value="Dinheiro">Dinheiro</option>
                </select>
            </div>

            <div class="total-bar">
                <span>Total</span>
                <span id="total-price">R$ 0,00</span>
            </div>

            <button id="finalizar-pedido" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> ENVIAR PARA O WHATSAPP
            </button>
        </section>
    </main>

    <footer class="main-footer">
        <p><strong>Pizzaria AW</strong></p>
        <p>Qualidade que você sente no sabor.</p>
        <p class="footer-bottom">&copy; 2026 | Desenvolvido por André Waldige</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
