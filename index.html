<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzaria AW | Cardápio Digital</title>
    
    <link rel="icon" type="image/jpeg" href="assets/img/pizzaria aw.jpg">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <div class="logo-area">
                <img src="assets/img/pizzaria aw.jpg" alt="Pizzaria AW" class="logo">
                <div class="brand-text">
                    <h1>Pizzaria AW</h1>
                    <span class="status"><i class="fas fa-circle"></i> Aberto Agora</span>
                </div>
            </div>
            <button class="cart-icon-btn" onclick="document.getElementById('order-summary').scrollIntoView({behavior: 'smooth'})">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </button>
        </div>
    </header>

    <main>
        <section id="gallery" class="carousel">
            <div class="carousel-container">
                <div class="carousel-slide active"><img src="assets/img/pepperoni.jpg" alt="Pizza de Pepperoni"></div>
                <div class="carousel-slide"><img src="assets/img/Pizza variadas.jpg" alt="Nossas Pizzas"></div>
                <div class="carousel-slide"><img src="assets/img/deliciosa-pizza.jpg" alt="Margherita Especial"></div>
            </div>
            <button class="carousel-prev"><i class="fas fa-chevron-left"></i></button>
            <button class="carousel-next"><i class="fas fa-chevron-right"></i></button>
        </section>

        <section id="search" class="sticky-search">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="O que vamos pedir hoje?">
            </div>
        </section>

        <section class="client-info-section">
            <div class="input-group">
                <label for="client-name">Seu Nome:</label>
                <input type="text" id="client-name" placeholder="Digite seu nome para o pedido...">
            </div>
        </section>

        <div id="menu-container"></div>

        <section id="order-summary" class="order-container">
            <h3><i class="fas fa-shopping-basket"></i> Meu Carrinho</h3>
            <hr>
            <div id="order-list">
                <p class="empty-msg">Seu carrinho está vazio.</p>
            </div>

            <div class="payment-area">
                <label for="payment">Forma de Pagamento:</label>
                <select id="payment">
                    <option value="pix">PIX</option>
                    <option value="cartao">Cartão (Entregador)</option>
                    <option value="dinheiro">Dinheiro</option>
                </select>
            </div>

            <div class="total-bar">
                <span>Total:</span>
                <span id="total-price">R$ 0,00</span>
            </div>

            <button id="finalizar-pedido" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> ENVIAR PEDIDO
            </button>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p><strong>Pizzaria AW</strong></p>
            <p>Rua da Pizza, 123 - São Paulo/SP</p>
            <p class="footer-bottom">&copy; 2026 Pizzaria AW | Desenvolvido por André Waldige</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
