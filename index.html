<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizzaria AW - Cardápio Online</title>

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='80'%3E🍕%3C/text%3E%3C/svg%3E">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="logo aw.png" alt="Logo da Pizzaria AW" class="logo">
            <h1>Pizzaria AW</h1>
        </div>
        <nav aria-label="Navegação principal do site">
            <ul>
                <li><a href="#menu">Cardápio</a></li>
                <li><a href="#order-summary">Meu Pedido</a></li>
                <li><a href="#gallery">Galeria</a></li>
                <li><a href="#location">Localização</a></li>
                <li><a href="#contact">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="gallery" class="carousel-container">
            <h2>Nossas Delícias</h2>
            <div class="carousel-slides">
                <img src="pepperoni.jpg" alt="Pizza de Pepperoni" class="carousel-item active">
                <img src="Pizza variadas.jpg" alt="Pizza variadas" class="carousel-item">
                <img src="deliciosa-pizza.jpg" alt="deliciosa-pizza" class="carousel-item">
                <img src="rúcula-com-tomate-seco.jpeg" alt="rúcula com tomate seco" class="carousel-item">
            </div>
            <button class="carousel-button prev" aria-label="Slide anterior">&#10094;</button>
            <button class="carousel-button next" aria-label="Próximo slide">&#10095;</button>
        </section>

        </main>

    <footer>
        <p>&copy; 2026 Pizzaria AW | Todos os direitos reservados.</p>
        <p>Desenvolvido por André Waldige</p>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
