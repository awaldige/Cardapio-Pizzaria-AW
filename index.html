<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizzaria AW | Cardápio Digital</title>
    <link rel="icon" type="image/png" href="assets/img/logo%20aw.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <img src="assets/img/logo%20aw.png" alt="Logo" class="nav-logo">
                <div>
                    <h1>Pizzaria AW</h1>
                    <small><i class="fas fa-circle status-on"></i> Aberto Agora</small>
                </div>
            </div>
            <div class="nav-cart" onclick="scrollToElement('order-summary')">
                <i class="fas fa-shopping-bag"></i>
                <span id="cart-count">0</span>
            </div>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="hero-carousel">
            <div class="slides">
                <div class="slide active"><img src="assets/img/camarao.jpg"></div>
                <div class="slide"><img src="assets/img/pizza%20variadas.jpg"></div>
                <div class="slide"><img src="assets/img/pizza.jpg"></div>
                <div class="slide"><img src="assets/img/pizzas.jpg"></div>
            </div>
        </section>

        <section class="search-section">
            <div class="search-field">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Buscar sabor ou bebida...">
            </div>
        </section>

        <div id="menu-container"></div>

        <section id="order-summary" class="checkout-card">
            <div class="checkout-header">
                <h2><i class="fas fa-receipt"></i> Seu Pedido</h2>
                <button class="btn-clear" onclick="clearCart()">Limpar</button>
            </div>

            <div id="order-list" class="checkout-items">
                <p class="empty-text">Seu carrinho está vazio</p>
            </div>

            <div class="total-row">
                <span>Total:</span>
                <strong id="total-price">R$ 0,00</strong>
            </div>

            <form id="checkout-form" class="delivery-form">
                <h3><i class="fas fa-map-marker-alt"></i> Dados de Entrega</h3>
                <div class="form-group">
                    <input type="text" id="client-name" placeholder="Nome Completo" required>
                </div>
                <div class="form-grid">
                    <input type="text" id="address" placeholder="Rua e Número" required>
                    <input type="text" id="neighborhood" placeholder="Bairro" required>
                </div>
                <div class="form-group">
                    <input type="text" id="reference" placeholder="Ponto de Referência (Opcional)">
                </div>
                <div class="form-group">
                    <label>Forma de Pagamento</label>
                    <select id="payment" onchange="toggleTroco()">
                        <option value="Pix">Pix</option>
                        <option value="Cartão">Cartão (Maquininha)</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                </div>
                <div id="troco-box" class="form-group" style="display:none">
                    <input type="number" id="troco" placeholder="Troco para quanto?">
                </div>
                <button type="submit" class="btn-confirm">
                    <i class="fab fa-whatsapp"></i> ENVIAR PEDIDO
                </button>
            </form>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
